<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RETAIN ADMIN | 客服回覆中心</title>
    <link rel="stylesheet" href="../shared/global.css">
    <link rel="stylesheet" href="feedback_admin.css">
</head>
<body>
    <nav class="top-nav">
        <a href="dashboard.html" class="nav-logo">RETAIN_ADMIN</a>
        <div class="nav-right-group">
            <a href="dashboard.html" class="nav-link">儀表板</a>
            <a href="plans.html" class="nav-link">方案資料維護</a>
            <a href="users.html" class="nav-link">使用者管理</a>
            <a href="feedback_admin.html" class="nav-link active">客服回覆中心</a>
            <button onclick="logout()" class="logout-btn">登出</button>
        </div>
    </nav>
    
    <div class="admin-main-content">
        <h1>客服回覆中心</h1>

        <div class="tab-container">
            <div style="display: flex; gap: 10px;">
                <button class="tab-btn active" id="tab-active" onclick="switchTab('active')">進行中</button>
                <button class="tab-btn" id="tab-resolved" onclick="switchTab('resolved')">歷史結案紀錄</button>
            </div>
            <div id="search-box-wrapper" style="display: none;">
                <input type="text" id="history-search" class="search-input" placeholder="搜尋帳號或編號..." oninput="handleSearch()">
            </div>
        </div>

        <div id="msg-container"></div>
        <div id="pagination" class="pagination-container"></div>
    </div>

    <script src="../shared/guard.js"></script>
    <script src="feedback_admin.js"></script>
</body>
</html>
