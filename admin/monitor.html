<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>RETAIN ADMIN | 系統監控</title>
    <link rel="stylesheet" href="../shared/global.css">
    <style>
        .status-dot { width: 15px; height: 15px; border-radius: 50%; display: inline-block; background: #2ecc71; margin-right: 10px; }
        .monitor-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
    </style>
</head>
<body>
    <nav class="top-nav">
        <a href="dashboard.html" class="nav-logo">RETAIN_ADMIN</a>
        <div class="nav-right-group">
            <a href="dashboard.html" class="nav-link">儀表板</a>
            <a href="monitor.html" class="nav-link active">系統監控</a>
            <button onclick="logout()" class="logout-btn">登出</button>
        </div>
    </nav>
    <div class="container admin-main-content">
        <h1>系統與 ML 模型監控</h1>
        <div class="monitor-grid">
            <div class="card-panel-black">
                <h3>ML Churn Prediction Model</h3>
                <p><span class="status-dot"></span> 狀態：運作中 (Healthy)</p>
                <p>準確度 (Accuracy)：94.2%</p>
                <p>最後訓練時間：2026-04-20</p>
                <button class="btn-black-rect" style="width:100%" onclick="alert('開始重新訓練模型...')">重新訓練模型</button>
            </div>
            <div class="card-panel-black">
                <h3>API Server 負載</h3>
                <p>CPU 使用率：12%</p>
                <p>記憶體使用：450MB</p>
                <p>資料庫連線：正常 (SQL Server)</p>
            </div>
        </div>
    </div>
</body>
</html>
