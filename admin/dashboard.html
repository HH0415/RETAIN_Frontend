<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RETAIN ADMIN | 儀表板</title>
    <link rel="stylesheet" href="../shared/global.css">
    <link rel="stylesheet" href="dashboard.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <nav class="top-nav">
        <a href="dashboard.html" class="nav-logo">RETAIN_ADMIN</a>
        <div class="nav-right-group">
            <a href="dashboard.html" class="nav-link active">儀表板</a>
            <a href="plans.html" class="nav-link">方案資料維護</a>
            <a href="users.html" class="nav-link">使用者管理</a>
            <a href="feedback_admin.html" class="nav-link">客服回覆中心</a>
            <button onclick="logout()" class="logout-btn">登出</button>
        </div>
    </nav>
    
    <div class="container dashboard-content">
        <h1 class="welcome-text">儀表板</h1>
        
        <div class="grid-layout admin-stat-grid">
            <div class="card-panel text-center">
                <h3 class="stat-title">平台註冊會員總數</h3>
                <div class="stat-number" id="total-users">載入中...</div>
                <p class="stat-desc">Users 表紀錄筆數</p>
            </div>
            
            <div class="card-panel text-center">
                <h3 class="stat-title">上架資費方案數</h3>
                <div class="stat-number" id="total-plans">載入中...</div>
                <p class="stat-desc">Plans 表紀錄筆數</p>
            </div>
            
            <div class="card-panel text-center highlight-bg">
                <h3 class="stat-title">待處理客服回覆</h3>
                <div class="stat-number" id="total-tickets">載入中...</div>
                <p class="stat-desc">Tickets 表未回覆筆數</p>
            </div>
        </div>

        <div style="display: flex; gap: 20px; margin-top: 30px; flex-wrap: wrap;">
            <div class="card-panel-black" style="flex: 1; min-width: 300px; border: 3px solid #000; padding: 20px; background-color: #fff; display: flex; flex-direction: column;">
                <h3 style="text-align: center; margin-bottom: 20px; font-weight: bold; font-size: 1.2rem;">各家電信市占率</h3>
                <div style="position: relative; height: 300px; width: 100%;">
                    <canvas id="providerChart"></canvas>
                </div>
            </div>
            <div class="card-panel-black" style="flex: 1; min-width: 300px; border: 3px solid #000; padding: 20px; background-color: #fff; display: flex; flex-direction: column;">
                <h3 style="text-align: center; margin-bottom: 20px; font-weight: bold; font-size: 1.2rem;">用戶流失風險比例</h3>
                <div style="position: relative; height: 300px; width: 100%;">
                    <canvas id="riskChart"></canvas>
                </div>
            </div>
        </div>

        <div class="card-panel full-width" style="margin-top: 30px; border: 3px solid #000; padding: 20px; background-color: #fff;">
            <h3 class="risk-title" style="margin-bottom: 10px; font-size: 1.3rem;">高流失風險名單 (溢繳嚴重用戶)</h3>
            <p class="table-subtitle" style="margin-bottom: 20px; font-size: 0.95rem; color: #555;">系統自動列出目前資費極度不划算，極可能跳槽至其他電信的用戶。</p>
            
            <div class="table-responsive">
                <table class="data-table main-list-table" style="width: 100%; border-collapse: collapse;">
                    <thead>
                        <tr>
                            <th style="border-bottom: 2px solid #000; padding: 10px; text-align: left;">使用者帳號</th>
                            <th style="border-bottom: 2px solid #000; padding: 10px; text-align: left;">目前電信</th>
                            <th style="border-bottom: 2px solid #000; padding: 10px; text-align: left;">目前月租</th>
                            <th style="border-bottom: 2px solid #000; padding: 10px; text-align: left;">每月用量</th>
                            <th style="border-bottom: 2px solid #000; padding: 10px; text-align: left;">建議轉換方案</th>
                            <th style="border-bottom: 2px solid #000; padding: 10px; text-align: right;">預計可省下</th>
                        </tr>
                    </thead>
                    <tbody id="risk-list-body">
                        <tr><td colspan="6" class="text-center" style="padding: 20px; text-align: center;">數據分析中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <script src="../shared/guard.js"></script>
    <script src="dashboard.js"></script>
</body>
</html>
