<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RETAIN PROVIDER | 客戶回覆中心</title>
    <link rel="stylesheet" href="../shared/global.css">
    <link rel="stylesheet" href="feedback.css">
</head>
<body>
    <nav class="top-nav">
        <a href="dashboard.html" class="nav-logo" id="nav-brand-logo">業者後台</a>
        <div class="nav-right-group">
            <a href="dashboard.html" class="nav-link">儀表板</a>
            <a href="plans.html" class="nav-link">自家方案維護</a>
            <a href="risk_users.html" class="nav-link">流失預警名單</a>
            <a href="feedback.html" class="nav-link active">客戶回覆</a>
            <button onclick="logout()" class="logout-btn">登出</button>
        </div>
    </nav>
    
    <div class="admin-main-content">
        <h1><span id="brand-title"></span> 客戶諮詢工單</h1>

        <div class="tab-container">
            <div style="display: flex; gap: 10px;">
                <button class="tab-btn active" id="tab-active" onclick="switchTab('active')">待處理工單</button>
                <button class="tab-btn" id="tab-resolved" onclick="switchTab('resolved')">歷史結案紀錄</button>
            </div>
            <div id="search-box-wrapper" style="display: none;">
                <input type="text" id="history-search" class="search-input" placeholder="搜尋客戶帳號或編號..." oninput="handleSearch()">
            </div>
        </div>

        <div id="msg-container"></div>
        <div id="pagination" class="pagination-container"></div>
    </div>

    <script src="../shared/guard.js"></script>
    <script src="feedback.js"></script>
</body>
</html>
