<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RETAIN PROVIDER | 業者儀表板</title>
    <link rel="stylesheet" href="../shared/global.css">
    <link rel="stylesheet" href="dashboard.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <nav class="top-nav">
        <a href="dashboard.html" class="nav-logo" id="nav-brand-logo">業者後台</a>
        <div class="nav-right-group">
            <a href="dashboard.html" class="nav-link active">儀表板</a>
            <a href="plans.html" class="nav-link">自家方案維護</a>
            <a href="risk_users.html" class="nav-link">流失預警名單</a>
            <a href="feedback.html" class="nav-link">客戶回覆</a>
            <button onclick="logout()" class="logout-btn">登出</button>
        </div>
    </nav>
    
    <div class="container dashboard-content">
        <h1 class="welcome-text"><span id="brand-title"></span> 專屬儀表板</h1>
        
        <div class="grid-layout admin-stat-grid">
            <div class="card-panel text-center">
                <h3 class="stat-title">自家用戶總數</h3>
                <div class="stat-number" id="provider-users">載入中...</div>
                <p class="stat-desc">目前使用貴公司門號的用戶數</p>
            </div>
            
            <div class="card-panel text-center">
                <h3 class="stat-title">上架方案數</h3>
                <div class="stat-number" id="provider-plans">載入中...</div>
                <p class="stat-desc">目前有效資費方案</p>
            </div>
            
            <div class="card-panel text-center highlight-bg">
                <h3 class="stat-title">高流失風險警報</h3>
                <div class="stat-number" id="provider-risk-count" style="color: #e74c3c;">載入中...</div>
                <p class="stat-desc">極可能跳槽的自家用戶數</p>
            </div>
        </div>

        <div style="display: flex; gap: 20px; margin-top: 30px; flex-wrap: wrap;">
            <div class="card-panel-black" style="flex: 1; min-width: 300px; border: 3px solid #000; padding: 20px; background-color: #fff; display: flex; flex-direction: column;">
                <h3 style="text-align: center; margin-bottom: 20px; font-weight: bold; font-size: 1.2rem;">自家方案訂閱分佈</h3>
                <div style="position: relative; height: 300px; width: 100%;">
                    <canvas id="providerPlanChart"></canvas>
                </div>
            </div>
            <div class="card-panel-black" style="flex: 1; min-width: 300px; border: 3px solid #000; padding: 20px; background-color: #fff; display: flex; flex-direction: column;">
                <h3 style="text-align: center; margin-bottom: 20px; font-weight: bold; font-size: 1.2rem;">自家用戶流失風險比例</h3>
                <div style="position: relative; height: 300px; width: 100%;">
                    <canvas id="providerRiskChart"></canvas>
                </div>
            </div>
        </div>

        <div class="card-panel full-width" style="margin-top: 30px; border: 3px solid #000; padding: 20px; background-color: #fff;">
            <h3 class="risk-title" style="margin-bottom: 10px; font-size: 1.3rem;">自家高流失風險名單</h3>
            <p class="table-subtitle" style="margin-bottom: 20px; font-size: 0.95rem; color: #555;">系統自動列出目前資費極度不划算，極可能跳槽至其他電信的自家用戶。</p>
            
            <div class="table-responsive">
                <table class="data-table main-list-table" style="width: 100%; border-collapse: collapse;">
                    <thead>
                        <tr>
                            <th style="border-bottom: 2px solid #000; padding: 10px; text-align: left;">使用者帳號</th>
                            <th style="border-bottom: 2px solid #000; padding: 10px; text-align: left;">目前月租</th>
                            <th style="border-bottom: 2px solid #000; padding: 10px; text-align: left;">每月用量</th>
                            <th style="border-bottom: 2px solid #000; padding: 10px; text-align: left;">建議轉換方案</th>
                            <th style="border-bottom: 2px solid #000; padding: 10px; text-align: right; color: red;">預計可省下</th>
                        </tr>
                    </thead>
                    <tbody id="provider-risk-list">
                        <tr><td colspan="5" class="text-center" style="padding: 20px; text-align: center;">數據分析中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <script src="../shared/guard.js"></script>
    <script src="dashboard.js"></script>
</body>
</html>
