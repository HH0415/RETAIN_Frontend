<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RETAIN | 忘記密碼</title>
    <link rel="stylesheet" href="forgot.css">
</head>
<body>

    <h1 class="page-title">忘記密碼</h1>

    <div class="forgot-box">
        <p class="description">
            請輸入您的帳號與註冊信箱，系統核對無誤後將寄送重設連結給您。
        </p>

        <form id="forgotForm">
            <div class="form-group">
                <label>使用者帳號 (Username)</label>
                <input type="text" id="username" class="input-field" placeholder="請輸入您的帳號" required>
            </div>

            <div class="form-group">
                <label>註冊信箱 (Email)</label>
                <input type="email" id="email" class="input-field" placeholder="請輸入綁定的 Email" required>
            </div>

            <div id="statusMsg" class="status-msg"></div>

            <button type="submit" id="submitBtn" class="btn-black">發送重設密碼信</button>
        </form>

        <div class="footer-links">
            <a href="login.html" class="back-link">返回登入</a>
        </div>
    </div>

    <script src="forgot.js"></script>
</body>
</html>
