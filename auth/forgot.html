<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RETAIN | 忘記密碼</title>
    <link rel="stylesheet" href="../shared/global.css">
    <link rel="stylesheet" href="forgot.css">
</head>
<body>
    <nav class="top-nav">
        <a href="login.html" class="nav-logo">RETAIN_SYSTEM</a>
        <div class="nav-right-group">
            <a href="login.html" class="nav-link">返回登入</a>
        </div>
    </nav>

    <div class="container forgot-container">
        <h1 class="page-title">重設密碼請求</h1>
        <div class="card-panel">
            <p class="instruction-text">
                請輸入您註冊時填寫的電子郵件，系統將發送重設連結至您的信箱。
            </p>
            <form id="forgotForm">
                <div class="form-group">
                    <label>註冊電子郵件 Email</label>
                    <input type="email" id="emailInput" class="input-field" placeholder="example@mail.com" required>
                </div>
                <button type="submit" class="btn-primary" id="sendBtn">發送重設郵件</button>
            </form>
            <div id="statusMsg" class="status-message"></div>
        </div>
    </div>

    <script src="forgot.js"></script>
</body>
</html>
