<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RETAIN | 登入</title>
    <link rel="stylesheet" href="../shared/global.css">
    <link rel="stylesheet" href="login.css">
</head>
<body class="auth-page">
    <div class="card-panel auth-card">
        <h1>系統登入</h1>
        <form id="loginForm">
            <div class="form-group">
                <label>帳號</label>
                <input type="text" id="username" class="input-field" required>
            </div>
            <div class="form-group">
                <label>密碼</label>
                <input type="password" id="password" class="input-field" required>
            </div>
            <button type="submit" class="btn-primary">驗證進入</button>
        </form>
        <div class="auth-footer">
            <a href="forgot.html">忘記密碼？</a>
            <span>|</span>
            <a href="register.html">建立帳號</a>
        </div>
    </div>
    <script src="login.js"></script>
</body>
</html>
