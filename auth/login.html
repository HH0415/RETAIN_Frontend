<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>RETAIN | 系統登入</title>
    <link rel="stylesheet" href="../shared/global.css">
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="container" style="max-width: 400px; margin-top: 100px;">
        <h1 style="text-align: center; margin-bottom: 20px;">RETAIN_LOGIN</h1>
        <div class="card-panel">
            <form id="loginForm">
                <label>使用者帳號</label>
                <input type="text" id="login-username" class="input-field" required>
                <label>密碼</label>
                <input type="password" id="login-password" class="input-field" required>
                <button type="submit" id="loginBtn" class="btn-primary">進入系統</button>
            </form>
            <div id="loginStatus" style="text-align: center; margin-top: 15px; font-weight: bold;"></div>
            <div style="text-align: center; margin-top: 20px; font-size: 0.8rem;">
                還沒有帳號？ <a href="register.html" style="color: #000;">點此註冊</a>
            </div>
        </div>
    </div>
    <script src="login.js"></script>
</body>
</html>
