<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RETAIN | 登入</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <h1 class="page-title">登入</h1>

    <div class="login-box">
        <form id="loginForm">
            <div class="form-group">
                <label>使用者帳號</label>
                <input type="text" id="username" class="input-field" placeholder="請輸入帳號" required>
            </div>

            <div class="form-group">
                <label>密碼</label>
                <input type="password" id="password" class="input-field" placeholder="••••••••" required>
            </div>

            <div id="statusMsg" class="status-msg"></div>

            <button type="submit" id="loginBtn" class="btn-black">進入系統</button>
        </form>

        <a href="forgot.html" class="forgot-link">忘記密碼？</a>
        
        <a href="register.html" class="register-link">還沒有帳號？ <span>點此註冊</span></a>
    </div>

    <script src="login.js"></script>
</body>
</html>
