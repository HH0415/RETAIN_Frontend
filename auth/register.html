<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RETAIN | 建立帳號</title>
    <link rel="stylesheet" href="../shared/global.css">
    <link rel="stylesheet" href="login.css"> </head>
<body class="auth-page">
    <div class="card-panel auth-card">
        <h1>建立帳號</h1>
        <form id="regForm">
            <div class="form-group">
                <label>帳號 ID</label>
                <input type="text" class="input-field" placeholder="請設定帳號 ID" required>
            </div>
            <div class="form-group">
                <label>電子郵件</label>
                <input type="email" class="input-field" placeholder="example@telecom.com" required>
            </div>
            <div class="form-group">
                <label>設定密碼</label>
                <input type="password" class="input-field" placeholder="請輸入密碼" required>
            </div>
            <button type="submit" class="btn-primary">確認註冊</button>
        </form>
        <div class="auth-footer">
            <a href="login.html">← 返回登入</a>
        </div>
    </div>
    <script src="register.js"></script>
</body>
</html>
