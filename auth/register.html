<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>RETAIN | 建立帳號</title>
    <link rel="stylesheet" href="../shared/global.css">
</head>
<body class="auth-page">
    <div class="card-panel">
        <h1 style="color: var(--accent);">建立帳號</h1>
        <form id="regForm">
            <div class="form-group">
                <label>帳號 ID</label>
                <input type="text" class="input-field" placeholder="請設定帳號 ID" required>
            </div>
            <div class="form-group">
                <label>電子郵件</label>
                <input type="email" class="input-field" placeholder="example@telecom.com" required>
            </div>
            <div class="form-group">
                <label>設定密碼</label>
                <input type="password" class="input-field" placeholder="請輸入密碼" required>
            </div>
            <button type="submit" class="btn-primary">確認註冊</button>
        </form>
        <p style="text-align:center; margin-top:30px;">
            <a href="login.html" style="color:var(--accent); text-decoration:none; font-size:0.9rem; font-weight:bold;">← 返回登入</a>
        </p>
    </div>
</body>
</html>
