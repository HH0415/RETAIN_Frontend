<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RETAIN | 註冊帳號</title>
    <link rel="stylesheet" href="register.css">
</head>
<body>

    <h1 class="page-title">註冊帳號</h1>

    <div class="register-box">
        <form id="registerForm">
            <div class="form-group">
                <label>使用者帳號</label>
                <input type="text" id="username" class="input-field" placeholder="請設定您的帳號" required>
            </div>

            <div class="form-group">
                <label>註冊信箱 (Email)</label>
                <input type="email" id="email" class="input-field" placeholder="example@mail.com" required>
            </div>

            <div class="form-group">
                <label>設定密碼</label>
                <input type="password" id="password" class="input-field" placeholder="••••••••" required>
            </div>

            <div class="form-group">
                <label>再次確認密碼</label>
                <input type="password" id="confirmPassword" class="input-field" placeholder="••••••••" required>
            </div>

            <div id="statusMsg" class="status-msg"></div>

            <button type="submit" id="registerBtn" class="btn-black">建立帳號</button>
        </form>

        <div class="footer-links">
            <a href="login.html" class="back-link">已有帳號？ <span>返回登入</span></a>
        </div>
    </div>

    <script src="register.js"></script>
</body>
</html>
