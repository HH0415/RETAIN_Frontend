<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RETAIN | 個人設定</title>
    <link rel="stylesheet" href="../shared/global.css">
    <link rel="stylesheet" href="profile.css">
    <script src="../shared/guard.js"></script>
</head>
<body>
    <nav class="top-nav">
        <a href="../user/dashboard.html" class="nav-logo">RETAIN_USER</a>
        <div class="nav-right-group">
            <a href="../user/dashboard.html" class="nav-link">方案推薦</a>
            <a href="../user/support.html" class="nav-link">客服中心</a>
            <a href="../user/environment.html" class="nav-link">環境資訊</a>
            <a href="profile.html" class="nav-link active">個人設定</a>
            <button onclick="logout()" class="logout-btn" id="logoutBtn">登出</button>
        </div>
    </nav>
    
    <div class="container" style="max-width: 700px; margin-top: 40px;">
        <h1 style="text-align: center; margin-bottom: 30px;">個人設定與合約管理</h1>
        
        <form id="profileForm">
            <div class="card-panel" style="border: 3px solid #000; padding: 30px; background: #fff; margin-bottom: 20px;">
                <h3 style="border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 20px;">基本聯絡資訊</h3>
                
                <div class="form-group" style="margin-bottom: 20px;">
                    <label style="display: block; margin-bottom: 8px; font-weight: bold;">系統帳號</label>
                    <input type="text" id="profile-username" class="input-field" disabled style="width: 100%; padding: 12px; border: 2px solid #000; background-color: #f5f5f5; color: #888; cursor: not-allowed; box-sizing: border-box;">
                </div>

                <div style="display: flex; gap: 20px;">
                    <div class="form-group" style="flex: 1; margin-bottom: 20px;">
                        <label style="display: block; margin-bottom: 8px; font-weight: bold;">聯絡電話</label>
                        <input type="tel" id="profile-phone" class="input-field" placeholder="09xx-xxx-xxx" style="width: 100%; padding: 12px; border: 2px solid #000; box-sizing: border-box; outline: none;">
                    </div>
                    <div class="form-group" style="flex: 1; margin-bottom: 20px;">
                        <label style="display: block; margin-bottom: 8px; font-weight: bold;">電子信箱 Email</label>
                        <input type="email" id="profile-email" class="input-field" placeholder="example@gmail.com" style="width: 100%; padding: 12px; border: 2px solid #000; box-sizing: border-box; outline: none;">
                    </div>
                </div>
            </div>

            <div class="card-panel" style="border: 3px solid #000; padding: 30px; background: #fff;">
                <h3 style="border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 20px;">目前的合約方案</h3>
                
                <div class="form-group" style="margin-bottom: 20px;">
                    <label style="display: block; margin-bottom: 8px; font-weight: bold;">目前使用的電信業者</label>
                    <select id="profile-provider" class="input-field" required style="width: 100%; padding: 12px; border: 2px solid #000; box-sizing: border-box; outline: none; background: #fff;">
                        <option value="中華電信">中華電信</option>
                        <option value="台灣大哥大">台灣大哥大</option>
                        <option value="遠傳電信">遠傳電信</option>
                        <option value="亞太電信">亞太電信</option>
                        <option value="台灣之星">台灣之星</option>
                        <option value="其他">其他</option>
                    </select>
                </div>
                
                <div style="display: flex; gap: 20px;">
                    <div class="form-group" style="flex: 1; margin-bottom: 20px;">
                        <label style="display: block; margin-bottom: 8px; font-weight: bold;">目前月租費 (NTD)</label>
                        <input type="number" id="profile-bill" class="input-field" required min="0" style="width: 100%; padding: 12px; border: 2px solid #000; box-sizing: border-box; outline: none;">
                    </div>
                    <div class="form-group" style="flex: 1; margin-bottom: 20px;">
                        <label style="display: block; margin-bottom: 8px; font-weight: bold;">平均用量 (GB)</label>
                        <input type="number" id="profile-usage" class="input-field" required min="0" style="width: 100%; padding: 12px; border: 2px solid #000; box-sizing: border-box; outline: none;">
                    </div>
                </div>
                
                <button type="submit" class="btn-black" style="width: 100%; background: #000; color: #fff; padding: 15px; border: none; font-size: 1.1rem; font-weight: bold; cursor: pointer;">儲存所有設定</button>
            </div>
        </form>
    </div>

    <script src="profile.js"></script>
</body>
</html>
