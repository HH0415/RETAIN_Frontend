<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>RETAIN | 方案推薦</title>
    <link rel="stylesheet" href="../shared/global.css">
    <link rel="stylesheet" href="../shared/nav.css">
    <link rel="stylesheet" href="recommendation.css">
</head>
<body>
    <nav class="top-nav" id="main-nav"></nav>
    <div class="container">
        <h1>方案推薦分析報告</h1>
        
        <div class="grid-layout">
            <div class="card-panel-dashed">
                <h3>目前的合約狀況</h3>
                <p>電信業者：<span id="curr-provider">-</span></p>
                <p>目前月租：<span id="curr-bill">-</span></p>
                <p>實際用量：<span id="curr-usage">-</span></p>
                <div id="status-text" class="status-box-small">正在分析...</div>
            </div>

            <div class="card-panel-solid">
                <span class="top-tag">TOP 1 首選</span>
                <h3>RETAIN 最佳推薦</h3>
                <p>推薦業者：<span id="rec-provider">-</span></p>
                <p>方案名稱：<span id="rec-plan">-</span></p>
                <p>新月租費：<span id="rec-bill">-</span></p>
                <button class="btn-black-small" id="rec-change-plan-btn">切換至此最佳方案</button>
            </div>
        </div>

        <div class="card-panel-solid">
            <h3>2026 市場全電信資費總覽</h3>
            <table class="main-table">
                <thead>
                    <tr>
                        <th width="120">推薦度</th>
                        <th>電信業者</th>
                        <th>方案名稱</th>
                        <th>網路流量</th>
                        <th>每月帳單</th>
                        <th width="100">操作</th>
                    </tr>
                </thead>
                <tbody id="alt-plans-body">
                    <tr><td colspan="6" style="text-align: center; padding: 30px;">載入中...</td></tr>
                </tbody>
            </table>
            <div id="pagination" class="pagination-container"></div>
        </div>
        <div class="savings-banner" id="saving-box">正在計算您的潛在節省金額...</div>
    </div>
    <script src="../shared/guard.js"></script>
    <script src="../shared/nav.js"></script>
    <script src="recommendation.js"></script>
</body>
</html>
