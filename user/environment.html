<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RETAIN | 訊號回報與環境</title>
    <link rel="stylesheet" href="../shared/global.css">
    <link rel="stylesheet" href="environment.css">
</head>
<body>
    <nav class="top-nav">
        <a href="dashboard.html" class="nav-logo">RETAIN_USER</a>
        <div class="nav-right-group">
            <a href="dashboard.html" class="nav-link">方案推薦</a>
            <a href="support.html" class="nav-link">客服中心</a>
            <a href="environment.html" class="nav-link active">環境資訊</a>
            <a href="../profile/profile.html" class="nav-link">個人設定</a>
            <button onclick="logout()" class="logout-btn" id="logoutBtn">登出</button>
        </div>
    </nav>

    <div class="container">
        <h1>訊號回報與環境</h1>

        <div class="card-panel">
            <h2 id="locationTitle">當前座標環境：載入中...</h2>

            <div class="county-selector">
                <label for="countySelect">選擇地區：</label>
                <select id="countySelect" onchange="loadWeather()">
                    <option value="">-- 選擇縣市 --</option>
                </select>
            </div>

            <div id="weatherCard" style="border: 2px solid #000; padding: 20px; margin: 20px 0; background: #f9f9f9;">
                <h3 id="weatherStatus" style="font-size: 1.5rem; margin-bottom: 10px;">即時氣候狀態：載入中...</h3>
                <p style="font-weight: bold; margin-bottom: 10px;">【氣象感知與科普生成】</p>
                <p id="weatherMessage">正在取得即時天氣資料...</p>
            </div>

            <a href="support.html" class="btn-primary" style="display: block; width: 100%; text-align: center; text-decoration: none;">訊號依然異常？前往客服中心回報</a>
        </div>
    </div>

    <script src="../shared/guard.js"></script>
    <script src="environment.js"></script>
</body>
</html>
